<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080b0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MC Status">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="/style.css">
  <title>Minecraft Server</title>
</head>
<body>
  <div id="hero">
    <img id="hero-bg" src="/assets/shadowninjagames.png" alt="">
    <div id="hero-overlay"></div>
    <div id="hero-bottom">
      <div id="hero-title-block">
        <h1 id="pack-name">Minecraft Server</h1>
        <span id="pack-version"></span>
      </div>
      <div id="status-indicator-wrap">
        <span class="indicator" id="status-indicator"></span>
        <span id="status-label">…</span>
      </div>
    </div>
  </div>

  <main>
    <section class="info-card" id="server-card">
      <h2 class="section-heading">Server</h2>
      <div class="info-box">
        <div class="info-row">
          <span class="info-label">Status</span>
          <span id="status-text" class="info-value">Checking…</span>
        </div>
        <div class="info-row" id="version-row">
          <span class="info-label">Version</span>
          <span id="version-text" class="info-value cyan"></span>
        </div>
        <div class="info-row">
          <span class="info-label">Players</span>
          <span id="player-count" class="info-value"></span>
        </div>
      </div>
    </section>

    <section class="info-card">
      <h2 class="section-heading">Online Players</h2>
      <ul class="player-list" id="player-list">
        <li class="dim">Loading…</li>
      </ul>
    </section>

    <div class="meta-row">
      <span class="dim small">Refreshing in <span id="countdown">15</span>s</span>
      <button class="icon-btn" id="refresh-btn" aria-label="Refresh now">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 3a5 5 0 0 0-4.546 2.914.5.5 0 0 1-.908-.418A6 6 0 0 1 14 8a.5.5 0 0 1-1 0 5 5 0 0 0-5-5z"/>
          <path d="M8 13a5 5 0 0 0 4.546-2.914.5.5 0 0 1 .908.418A6 6 0 0 1 2 8a.5.5 0 0 1 1 0 5 5 0 0 0 5 5z"/>
        </svg>
      </button>
    </div>

    <button class="install-btn hidden" id="install-btn">Add to Home Screen</button>
  </main>

  <script src="/app.js"></script>
</body>
</html>
