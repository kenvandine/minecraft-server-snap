name: Reusable Pack Release

on:
  workflow_call:
    inputs:
      config:
        description: Path to the pack YAML config file
        required: true
        type: string
      tag:
        description: Release tag (e.g. v1.0.0)
        required: true
        type: string
      tools-version:
        description: Version of game-create tools to use (tag or 'latest')
        required: false
        default: latest
        type: string
    secrets:
      GH_TOKEN:
        required: true
      azure_client_id:
        required: false

jobs:
  build-artifacts:
    name: Build pack artifacts
    runs-on: ubuntu-24.04
    outputs:
      pack-name: ${{ steps.meta.outputs.name }}
      pack-version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml --quiet

      - name: Install game-create
        run: |
          if [ "${{ inputs.tools-version }}" = "latest" ]; then
            TOOLS_TAG=$(curl -s https://api.github.com/repos/kenvandine/minecraft-server-snap/releases/latest | jq -r .tag_name)
          else
            TOOLS_TAG="${{ inputs.tools-version }}"
          fi
          curl -L -o /usr/local/bin/game-create \
            "https://github.com/kenvandine/minecraft-server-snap/releases/download/${TOOLS_TAG}/game-create-linux"
          chmod +x /usr/local/bin/game-create

      - name: Inject azure_client_id
        env:
          AZURE_CLIENT_ID: ${{ secrets.azure_client_id }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then
            python3 -c "import yaml,os; c='${{ inputs.config }}'; d=yaml.safe_load(open(c)); d['azure_client_id']=os.environ['AZURE_CLIENT_ID']; open(c,'w').write(yaml.dump(d,default_flow_style=False,allow_unicode=True))"
          fi

      - name: Build artifacts
        run: game-create build ${{ inputs.config }} --output ./dist

      - name: Read pack metadata
        id: meta
        run: |
          echo "name=$(python3 -c "import yaml; d=yaml.safe_load(open('${{ inputs.config }}')); print(d['name'])")" >> $GITHUB_OUTPUT
          echo "version=$(python3 -c "import yaml; d=yaml.safe_load(open('${{ inputs.config }}')); print(d['version'])")" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: pack-artifacts
          path: dist/

  build-launcher-linux:
    name: Build launcher (Linux AppImage)
    needs: build-artifacts
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout launcher template
        uses: actions/checkout@v6
        with:
          repository: kenvandine/minecraft-server-snap
          sparse-checkout: launcher

      - uses: actions/download-artifact@v8
        with:
          name: pack-artifacts
          path: pack-dist/

      - name: Inject client artifact
        run: |
          mkdir -p launcher/resources/mods
          tar -xJf pack-dist/client.tar.xz -C launcher/resources/
          ls launcher/resources/

      - name: Update app name in electron-builder config
        run: |
          PACK_NAME="${{ needs.build-artifacts.outputs.pack-name }}"
          PACK_VERSION="${{ needs.build-artifacts.outputs.pack-version }}"
          SLUG=$(echo "$PACK_NAME" | tr '[:upper:]' '[:lower:]' | sed "s/[^a-z0-9]/-/g" | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
          sed -i "s/productName: .*/productName: \"$PACK_NAME\"/" launcher/electron-builder.yml
          sed -i "s/appId: .*/appId: \"com.minecraft.${SLUG}\"/" launcher/electron-builder.yml
          jq --arg name "$SLUG" --arg version "$PACK_VERSION" '.name = $name | .version = $version' launcher/package.json > launcher/package.json.tmp && mv launcher/package.json.tmp launcher/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install and build
        working-directory: launcher
        run: |
          npm ci
          npm run build:linux

      - uses: actions/upload-artifact@v7
        with:
          name: launcher-linux
          path: launcher/dist/*.AppImage

  build-launcher-windows:
    name: Build launcher (Windows exe)
    needs: build-artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout launcher template
        uses: actions/checkout@v6
        with:
          repository: kenvandine/minecraft-server-snap
          sparse-checkout: launcher

      - uses: actions/download-artifact@v8
        with:
          name: pack-artifacts
          path: pack-dist/

      - name: Inject client artifact
        shell: bash
        run: |
          mkdir -p launcher/resources/mods
          tar -xJf pack-dist/client.tar.xz -C launcher/resources/

      - name: Update app name in electron-builder config
        shell: bash
        run: |
          PACK_NAME="${{ needs.build-artifacts.outputs.pack-name }}"
          PACK_VERSION="${{ needs.build-artifacts.outputs.pack-version }}"
          SLUG=$(echo "$PACK_NAME" | tr '[:upper:]' '[:lower:]' | sed "s/[^a-z0-9]/-/g" | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
          sed -i "s/productName: .*/productName: \"$PACK_NAME\"/" launcher/electron-builder.yml
          sed -i "s/appId: .*/appId: \"com.minecraft.${SLUG}\"/" launcher/electron-builder.yml
          jq --arg name "$SLUG" --arg version "$PACK_VERSION" '.name = $name | .version = $version' launcher/package.json > launcher/package.json.tmp && mv launcher/package.json.tmp launcher/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install and build
        working-directory: launcher
        run: |
          npm ci
          npm run build:win

      - uses: actions/upload-artifact@v7
        with:
          name: launcher-windows
          path: launcher/dist/*.exe

  publish-release:
    name: Publish GitHub release
    needs: [build-artifacts, build-launcher-linux, build-launcher-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: all-artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ inputs.tag }}
          name: "${{ needs.build-artifacts.outputs.pack-name }} ${{ inputs.tag }}"
          body: |
            ## ${{ needs.build-artifacts.outputs.pack-name }} ${{ needs.build-artifacts.outputs.pack-version }}

            ### Installing

            **Server** (requires the [minecraft-server snap](https://github.com/kenvandine/minecraft-server-snap)):
            ```bash
            sudo minecraft-server.install-pack <server.tar.xz URL>
            sudo snap restart minecraft-server.server
            ```

            **Client**:
            - **Linux**: Download the `.AppImage`, make it executable, run it
            - **Windows**: Download and run the `.exe` installer
          files: |
            all-artifacts/server.tar.xz
            all-artifacts/*.AppImage
            all-artifacts/*.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
