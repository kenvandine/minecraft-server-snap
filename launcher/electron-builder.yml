appId: "com.minecraft.kadens-revenge"
productName: "Kaden's Revenge"
afterPack: build/afterPack.js
icon: src/renderer/assets/icon.png
directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - resources/**/*
  - "!resources/mods/.gitkeep"

extraResources:
  - from: resources/
    to: .
    filter:
      - "**/*"

linux:
  artifactName: "${name}-${version}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
  category: Game

win:
  artifactName: "${name}-setup-${version}.${ext}"
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  artifactName: "${name}-${version}.${ext}"
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.games
