appId: "com.minecraft.modpack-launcher"
productName: "Minecraft Launcher"
icon: src/renderer/assets/icon.png
directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - resources/**/*
  - "!resources/mods/.gitkeep"

extraResources:
  - from: resources/
    to: .
    filter:
      - "**/*"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Game
  env:
    ELECTRON_OZONE_PLATFORM_HINT: auto

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
